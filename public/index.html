<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BunnyChrroll - Premium Anime Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0b0b0d;
            --bg-secondary: #141416;
            --bg-surface: #1c1c20;
            --bg-card: #24242a;

            --brand-primary: #ff7a00;
            --brand-secondary: #ff9d00;
            --brand-accent: #ffb84d;

            --text-primary: #ffffff;
            --text-secondary: #d1d5db;
            --text-muted: #9ca3af;

            --success: #22c55e;
            --warning: #facc15;
            --danger: #ef4444;
            --info: #38bdf8;

            --border: #2d2d33;
            --border-light: #3f3f46;

            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 12px 40px rgba(255, 122, 0, 0.18);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 18px;
            --radius-xl: 24px;

            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                circle at 20% 50%,
                rgba(255, 122, 0, 0.05) 0%,
                transparent 50%
            ),
            radial-gradient(
                circle at 80% 80%,
                rgba(56, 189, 248, 0.03) 0%,
                transparent 50%
            );
            pointer-events: none;
            z-index: -1;
            animation: pulseGradient 15s ease-in-out infinite;
        }

        @keyframes pulseGradient {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-surface);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--brand-primary);
            border-radius: 5px;
            transition: background 0.3s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--brand-secondary);
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            background: rgba(11, 11, 13, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 0 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .logo i {
            color: var(--brand-primary);
        }

        .search-container {
            flex: 1;
            max-width: 400px;
            margin: 0 40px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px 12px 40px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: 14px;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }

        .search-input:focus {
            outline: none;
            background: rgba(255, 122, 0, 0.1);
            border-color: var(--brand-primary);
            box-shadow: 0 0 20px rgba(255, 122, 0, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--brand-primary);
            transition: width 0.3s ease;
        }

        .nav-link:hover {
            color: var(--brand-primary);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .btn-primary {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: #000;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
            box-shadow: var(--shadow-lg);
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 48px rgba(255, 122, 0, 0.25);
        }

        /* Main Content */
        main {
            margin-top: 80px;
            padding: 60px 40px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 80px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: clamp(36px, 8vw, 72px);
            font-weight: 700;
            margin-bottom: 20px;
            font-family: 'Space Grotesk', sans-serif;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary), var(--brand-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Anime Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .anime-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            position: relative;
            group: 'card';
            animation: fadeInScale 0.6s ease-out;
            animation-fill-mode: both;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .anime-card:nth-child(1) { animation-delay: 0.05s; }
        .anime-card:nth-child(2) { animation-delay: 0.1s; }
        .anime-card:nth-child(3) { animation-delay: 0.15s; }
        .anime-card:nth-child(4) { animation-delay: 0.2s; }
        .anime-card:nth-child(5) { animation-delay: 0.25s; }
        .anime-card:nth-child(6) { animation-delay: 0.3s; }
        .anime-card:nth-child(n+7) { animation-delay: 0.35s; }

        .anime-card:hover {
            background: rgba(255, 122, 0, 0.15);
            border-color: var(--brand-primary);
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }

        .anime-poster {
            width: 100%;
            height: 280px;
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            overflow: hidden;
            position: relative;
        }

        .anime-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .anime-card:hover .anime-poster img {
            transform: scale(1.08);
        }

        .anime-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--brand-primary);
            color: #000;
            padding: 6px 12px;
            border-radius: var(--radius-md);
            font-size: 12px;
            font-weight: 600;
            z-index: 10;
        }

        .anime-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .anime-meta {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .anime-rating {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .anime-rating .star {
            color: var(--brand-secondary);
        }

        .anime-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .anime-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .tag {
            background: rgba(255, 122, 0, 0.2);
            color: var(--brand-secondary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .anime-action {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .watch-btn {
            flex: 1;
            padding: 10px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            color: #000;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }

        .watch-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(255, 122, 0, 0.3);
        }

        .info-btn {
            flex: 1;
            padding: 10px;
            background: var(--glass);
            color: var(--brand-primary);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Poppins', sans-serif;
        }

        .info-btn:hover {
            background: rgba(255, 122, 0, 0.1);
            border-color: var(--brand-primary);
        }

        /* Detail Page */
        .detail-container {
            max-width: 1200px;
            margin: 0 auto;
            display: none;
        }

        .detail-header {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
            margin-bottom: 50px;
            align-items: start;
            animation: fadeInUp 0.8s ease-out;
        }

        .detail-poster {
            width: 100%;
            height: 400px;
            background: var(--bg-surface);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--glass-border);
        }

        .detail-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-info h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            font-family: 'Space Grotesk', sans-serif;
        }

        .detail-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .meta-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: var(--radius-lg);
            font-size: 14px;
        }

        .meta-label {
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .meta-value {
            color: var(--brand-primary);
            font-weight: 600;
            font-size: 16px;
        }

        .detail-synopsis {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: var(--radius-xl);
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .detail-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
            position: relative;
            padding-left: 15px;
        }

        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            border-radius: 2px;
        }

        .episodes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .episode-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: var(--radius-lg);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .episode-item:hover {
            background: rgba(255, 122, 0, 0.15);
            border-color: var(--brand-primary);
            transform: translateY(-5px);
        }

        .episode-number {
            font-size: 18px;
            font-weight: 700;
            color: var(--brand-primary);
            margin-bottom: 8px;
        }

        .genres-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .genre-badge {
            background: linear-gradient(135deg, rgba(255, 122, 0, 0.3), rgba(255, 157, 0, 0.2));
            border: 1px solid var(--brand-primary);
            color: var(--brand-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--glass);
            border-top-color: var(--brand-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .header-content {
                padding: 0 30px;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 20px;
            }

            .detail-header {
                grid-template-columns: 250px 1fr;
                gap: 30px;
            }

            .detail-meta {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            header {
                height: auto;
                padding: 15px 0;
            }

            .header-content {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }

            .logo {
                font-size: 20px;
            }

            .search-container {
                width: 100%;
                max-width: none;
                margin: 0;
                order: 3;
            }

            .nav-menu {
                gap: 15px;
                flex-wrap: wrap;
                order: 2;
            }

            main {
                padding: 30px 20px;
                margin-top: 200px;
            }

            .hero h1 {
                font-size: 36px;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .detail-header {
                grid-template-columns: 1fr;
            }

            .detail-poster {
                height: 300px;
            }

            .detail-info h1 {
                font-size: 32px;
            }
        }

        @media (max-width: 480px) {
            .nav-link {
                display: none;
            }

            .search-container {
                max-width: 100%;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 12px;
            }

            .anime-card {
                padding: 12px;
            }

            .anime-poster {
                height: 200px;
                margin-bottom: 12px;
            }

            .anime-title {
                font-size: 14px;
            }

            .detail-info h1 {
                font-size: 24px;
            }

            .detail-meta {
                grid-template-columns: 1fr;
            }

            .episodes-list {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--brand-primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 30px;
            transition: var(--transition);
            cursor: pointer;
        }

        .back-btn:hover {
            gap: 15px;
        }

        /* No Results */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 80px;
            color: var(--brand-primary);
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-text {
            color: var(--text-secondary);
            font-size: 18px;
        }

        /* Success Message */
        .success-msg {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: var(--success);
            padding: 15px 20px;
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
            display: none;
        }

        .success-msg.show {
            display: block;
            animation: slideDown 0.3s ease-out;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">
                <i class="fas fa-rabbit"></i> BunnyChrroll
            </div>
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search anime...">
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-link" id="homeLink">Home</a>
                <a href="#" class="nav-link">Popular</a>
                <a href="#" class="nav-link">Top Rated</a>
                <button class="btn-primary">Get Premium</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Home View -->
        <div class="home-view" id="homeView">
            <div class="hero">
                <h1>Discover Premium Anime</h1>
                <p>Stream your favorite anime with multiple language options</p>
            </div>

            <div class="success-msg" id="successMsg">
                <i class="fas fa-check-circle"></i> Anime loaded successfully!
            </div>

            <div class="anime-grid" id="animeGrid">
                <!-- Will be populated by JS -->
            </div>

            <div class="loading" id="homeLoading" style="display: none;">
                <div class="spinner"></div>
                <p class="loading-text">Loading anime...</p>
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">
                    <i class="fas fa-search"></i>
                </div>
                <p class="empty-text">No anime found. Try searching for something else.</p>
            </div>
        </div>

        <!-- Detail View -->
        <div class="detail-container" id="detailView">
            <a href="#" class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>

            <div class="detail-loading" style="display: none;">
                <div class="spinner"></div>
                <p class="loading-text">Loading anime details...</p>
            </div>

            <div class="detail-content" id="detailContent" style="display: none;">
                <!-- Will be populated by JS -->
            </div>
        </div>
    </main>

    <script>
        const API_BASE = '';
        let currentPage = 'home';

        // DOM Elements
        const homeView = document.getElementById('homeView');
        const detailView = document.getElementById('detailView');
        const animeGrid = document.getElementById('animeGrid');
        const searchInput = document.getElementById('searchInput');
        const homeLoading = document.getElementById('homeLoading');
        const emptyState = document.getElementById('emptyState');
        const homeLink = document.getElementById('homeLink');
        const backBtn = document.getElementById('backBtn');
        const successMsg = document.getElementById('successMsg');
        const detailLoading = document.querySelector('.detail-loading');
        const detailContent = document.getElementById('detailContent');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadHome();
            setupEventListeners();
        });

        function setupEventListeners() {
            searchInput.addEventListener('input', debounce(handleSearch, 500));
            homeLink.addEventListener('click', (e) => {
                e.preventDefault();
                loadHome();
            });
            backBtn.addEventListener('click', (e) => {
                e.preventDefault();
                loadHome();
            });
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        async function loadHome() {
            currentPage = 'home';
            homeView.style.display = 'block';
            detailView.style.display = 'none';
            homeLoading.style.display = 'block';
            animeGrid.innerHTML = '';
            emptyState.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/home`);
                const data = await response.json();
                homeLoading.style.display = 'none';

                if (data.success && data.data.length > 0) {
                    showSuccessMessage();
                    renderAnimeGrid(data.data);
                } else {
                    emptyState.style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading home:', error);
                homeLoading.style.display = 'none';
                emptyState.style.display = 'block';
            }
        }

        async function handleSearch(e) {
            const query = searchInput.value.trim();
            if (!query) {
                loadHome();
                return;
            }

            homeLoading.style.display = 'block';
            animeGrid.innerHTML = '';
            emptyState.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                homeLoading.style.display = 'none';

                if (data.success && data.results.length > 0) {
                    showSuccessMessage();
                    renderAnimeGrid(data.results);
                } else {
                    emptyState.style.display = 'block';
                }
            } catch (error) {
                console.error('Error searching:', error);
                homeLoading.style.display = 'none';
                emptyState.style.display = 'block';
            }
        }

        function renderAnimeGrid(anime) {
            animeGrid.innerHTML = anime.map((item, index) => `
                <div class="anime-card" style="animation-delay: ${index * 0.05}s">
                    <div class="anime-poster">
                        <img src="${item.poster || 'https://via.placeholder.com/220x280?text=No+Image'}" 
                             alt="${item.title}" 
                             onerror="this.src='https://via.placeholder.com/220x280?text=No+Image'">
                        <div class="anime-badge">${item.status || 'Airing'}</div>
                    </div>
                    <h3 class="anime-title">${item.title}</h3>
                    <div class="anime-meta">
                        <span>${item.year || '2026'}</span>
                        <div class="anime-rating">
                            <i class="fas fa-star star"></i>
                            ${item.rating || '8.0'}
                        </div>
                    </div>
                    <p class="anime-desc">${item.description || 'Premium anime streaming experience'}</p>
                    <div class="anime-tags">
                        <span class="tag">${item.episodes || '12'} EP</span>
                        <span class="tag">${(item.genre || 'Action').split(',')[0]}</span>
                    </div>
                    <div class="anime-action">
                        <button class="watch-btn" onclick="loadDetail('${item.slug}')">
                            <i class="fas fa-play"></i> Watch
                        </button>
                        <button class="info-btn" onclick="loadDetail('${item.slug}')">
                            <i class="fas fa-info-circle"></i> Info
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function loadDetail(slug) {
            currentPage = 'detail';
            homeView.style.display = 'none';
            detailView.style.display = 'block';
            detailLoading.style.display = 'block';
            detailContent.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/api/anime/${slug}`);
                const data = response.json();

                setTimeout(async () => {
                    const detailData = await data;
                    detailLoading.style.display = 'none';

                    if (detailData.success) {
                        renderDetailPage(detailData.data);
                        detailContent.style.display = 'block';
                    }
                }, 300);
            } catch (error) {
                console.error('Error loading detail:', error);
                detailLoading.style.display = 'none';
            }
        }

        function renderDetailPage(anime) {
            const genresHtml = (anime.genres || []).map(g => 
                `<div class="genre-badge">${g}</div>`
            ).join('');

            const episodesHtml = (anime.episodes || []).map((ep, i) =>
                `<div class="episode-item" onclick="alert('Episode ${ep.number}: ${ep.title}')">
                    <div class="episode-number">${ep.number}</div>
                    <div style="font-size: 11px; color: var(--text-muted);">EP ${ep.number}</div>
                </div>`
            ).join('');

            const languagesHtml = (anime.languages || []).map(lang =>
                `<span class="tag">${lang}</span>`
            ).join('');

            detailContent.innerHTML = `
                <div class="detail-header">
                    <div class="detail-poster">
                        <img src="${anime.poster || 'https://via.placeholder.com/300x400'}" 
                             alt="${anime.title}"
                             onerror="this.src='https://via.placeholder.com/300x400'">
                    </div>
                    <div>
                        <h1>${anime.title}</h1>
                        <div class="detail-meta">
                            <div class="meta-item">
                                <div class="meta-label">Status</div>
                                <div class="meta-value">${anime.status || 'Unknown'}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Episodes</div>
                                <div class="meta-value">${anime.totalEpisodes || '?'}</div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Rating</div>
                                <div class="meta-value">
                                    <i class="fas fa-star" style="color: var(--brand-secondary)"></i>
                                    ${anime.rating || 'N/A'}
                                </div>
                            </div>
                            <div class="meta-item">
                                <div class="meta-label">Year</div>
                                <div class="meta-value">${anime.year || '2026'}</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="detail-section">
                    <div class="detail-synopsis">
                        <h3 style="font-size: 18px; margin-bottom: 15px; color: var(--brand-primary);">Synopsis</h3>
                        ${anime.synopsis || 'Premium anime streaming with multiple languages available.'}
                    </div>
                </div>

                <div class="detail-section">
                    <h2 class="section-title">Information</h2>
                    <div class="detail-meta" style="margin-bottom: 20px;">
                        <div class="meta-item">
                            <div class="meta-label">Type</div>
                            <div class="meta-value">${anime.type || 'TV'}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Studio</div>
                            <div class="meta-value">${anime.studio || 'Unknown'}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Source</div>
                            <div class="meta-value">${anime.source || 'Manga'}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Director</div>
                            <div class="meta-value">${anime.director || 'N/A'}</div>
                        </div>
                    </div>
                </div>

                ${anime.genres && anime.genres.length > 0 ? `
                <div class="detail-section">
                    <h2 class="section-title">Genres</h2>
                    <div class="genres-list">
                        ${genresHtml}
                    </div>
                </div>
                ` : ''}

                ${anime.languages && anime.languages.length > 0 ? `
                <div class="detail-section">
                    <h2 class="section-title">Available Languages</h2>
                    <div class="anime-tags">
                        ${languagesHtml}
                    </div>
                </div>
                ` : ''}

                ${anime.episodes && anime.episodes.length > 0 ? `
                <div class="detail-section">
                    <h2 class="section-title">Episodes</h2>
                    <div class="episodes-list">
                        ${episodesHtml}
                    </div>
                </div>
                ` : ''}
            `;
        }

        function showSuccessMessage() {
            successMsg.classList.add('show');
            setTimeout(() => {
                successMsg.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
